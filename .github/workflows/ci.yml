name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js

        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare environment (SQLite)
        run: |
          echo "DATABASE_URL=file:./prisma/dev.db" > .env
          echo "DISABLE_EMAILS=1" >> .env
          echo "REDIS_URL=" >> .env

      - name: Generate Prisma client
        run: npx prisma generate

      

      - name: Run migrations (SQLite)
        run: npx prisma migrate deploy
        continue-on-error: true

      - name: Run tests
        env:
          NODE_ENV: test
          CI_TOKEN: ${{ secrets.HUB4SCUBA_CI_TOKEN }}
        run:  npm test -- --runInBand --detectOpenHandles --verbose 2>&1 | tee jest.log
              exit with non-zero if tests failed
               if [ -s jest.log ]; then grep -q "FAIL" jest.log && exit 1 || exit 0 fi


      - name: Upload jest log 
        if: always() 
        uses: actions/upload-artifact@v4
        with: 
            name: jest-log 
            path: jest.log    

     